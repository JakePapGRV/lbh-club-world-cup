# Render blueprint: provisions the web service + a managed Postgres database together.
# Deploy by connecting this repo on render.com -> "New +" -> "Blueprint".
services:
  - type: web
    name: world-cup-draft
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: world-cup-draft-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false # set this yourself in the Render dashboard
      - key: SESSION_SECRET
        generateValue: true
      - key: FOOTBALL_DATA_TOKEN
        sync: false # paste your football-data.org token in the dashboard
      - key: SCORE_SYNC_CRON
        value: "*/5 * * * *"

databases:
  - name: world-cup-draft-db
    plan: free
